<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QQ Lyrics">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>QQ 歌词 · 状态栏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <!-- Dynamic Island / Notch -->
    <div class="dynamic-island">
      <div class="notch-sensor"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-left">
        <span class="status-time" id="statusTime">9:41</span>
      </div>
      <div class="status-center" id="statusCenter">
        <!-- Default: app label -->
        <span class="status-label" id="statusLabel">QQ Lyrics</span>
        <!-- When playing: lyrics ticker -->
        <div class="status-lyrics hidden" id="statusLyrics">
          <div class="status-lyric-cn" id="statusLyricCN"></div>
          <div class="status-lyric-trans" id="statusLyricTrans"></div>
        </div>
      </div>
      <div class="status-right">
        <button class="mode-toggle" id="modeToggle" title="切换显示模式">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
        <svg class="status-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="3" width="22" height="14" rx="2"/>
          <path d="M6 7v6M10 7v6M14 7v6M18 7v6"/>
        </svg>
        <span class="status-battery">92%</span>
      </div>
    </div>

    <!-- Lyric Bar (compact mode) -->
    <div class="lyric-bar hidden" id="lyricBar">
      <div class="lyric-bar-bg"></div>
      <div class="lyric-bar-content">
        <span class="lyric-bar-cn" id="lyricBarCN"></span>
        <span class="lyric-bar-trans" id="lyricBarTrans"></span>
      </div>
      <div class="lyric-bar-progress" id="lyricBarProgress"></div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Lock Screen Clock -->
      <div class="lock-clock" id="lockClock">
        <div class="clock-time" id="clockTime">9:41</div>
        <div class="clock-date" id="clockDate">2026年7月1日 星期四</div>
      </div>

      <!-- Empty State / Search Prompt -->
      <div class="empty-state" id="emptyState">
        <svg class="empty-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
          <path d="M11 8v6M8 11h6"/>
        </svg>
        <p class="empty-text">搜索歌曲 · 查看歌词与翻译</p>
      </div>

      <!-- Now Playing Info -->
      <div class="now-playing hidden" id="nowPlaying">
        <div class="album-art-container">
          <div class="album-art" id="albumArt">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 8v8M9 12h6"/>
            </svg>
          </div>
        </div>
        <div class="song-info">
          <h2 class="song-title" id="songTitle">晴天</h2>
          <p class="song-artist" id="songArtist">周杰伦</p>
        </div>
      </div>

      <!-- Lyrics Display -->
      <div class="lyrics-area hidden" id="lyricsArea">
        <div class="lyrics-scroll" id="lyricsScroll">
          <!-- Lyrics will be rendered here -->
        </div>
      </div>

      <!-- Loading indicator -->
      <div class="loading hidden" id="loading">
        <div class="loading-spinner"></div>
        <span>加载歌词中...</span>
      </div>
    </div>

    <!-- Bottom Search Bar -->
    <div class="search-bar">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索 QQ 音乐歌曲..." autocomplete="off">
      </div>
    </div>

    <!-- Search Results Overlay -->
    <div class="search-results hidden" id="searchResults">
      <div class="results-header">
        <span>搜索结果</span>
        <button class="close-btn" id="closeResults">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="results-list" id="resultsList">
        <!-- Results rendered here -->
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>
  </div>

  <script src="app.js"></script>
  <script>
    // Register Service Worker for PWA
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").then(function(reg) {
        console.log("SW registered:", reg.scope);
      }).catch(function(err) {
        console.log("SW registration failed:", err);
      });
    }
  </script>
</body>
</html>
